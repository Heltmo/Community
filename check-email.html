<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UAN — Sjekk innboksen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 2rem 1.25rem;
        background: #080810;
        position: relative; overflow: hidden;
      }

      .bg-video-wrap { position: fixed; inset: 0; z-index: 0; }
      .bg-video-wrap video {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0; transition: opacity 1.4s ease-in-out; transform: scale(1.05);
      }
      .bg-video-wrap video.active { opacity: 1; }
      .bg-overlay {
        position: fixed; inset: 0; z-index: 1; pointer-events: none;
        background:
          radial-gradient(ellipse 55% 65% at 50% 50%, rgba(8,8,18,0.78) 0%, rgba(8,8,18,0.55) 60%, rgba(8,8,18,0.35) 100%),
          linear-gradient(180deg, rgba(8,8,18,0.5) 0%, rgba(8,8,18,0.6) 100%);
      }

      .card {
        position: relative; z-index: 2;
        width: min(420px, 100%);
        background: rgba(12,12,22,0.82);
        border: 1px solid rgba(255,255,255,0.09);
        border-radius: 1.75rem; padding: 3rem 2.75rem;
        backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
        box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 40px 100px rgba(0,0,0,0.65);
        animation: rise 0.65s cubic-bezier(0.22,1,0.36,1) both;
        text-align: center;
      }
      @keyframes rise { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
      .card::before {
        content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(140,100,255,0.55), transparent);
      }

      .brand { display: flex; align-items: center; justify-content: center; gap: 0.55rem; margin-bottom: 2.5rem; }
      .brand-dot {
        width: 10px; height: 10px; border-radius: 50%;
        background: linear-gradient(135deg, #a78bfa, #c4b5fd);
        box-shadow: 0 0 10px rgba(167,139,250,0.55);
      }
      .brand-label { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.45); }

      .email-icon {
        width: 64px; height: 64px; border-radius: 50%;
        background: linear-gradient(135deg, rgba(124,92,252,0.2), rgba(167,139,250,0.1));
        border: 1px solid rgba(167,139,250,0.2);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.8rem; margin: 0 auto 1.5rem;
      }

      h1 { font-size: 1.6rem; font-weight: 700; color: #fff; letter-spacing: -0.025em; margin-bottom: 0.6rem; }

      .subtitle {
        font-size: 0.875rem; color: rgba(255,255,255,0.4); line-height: 1.65; margin-bottom: 1.25rem;
      }

      .email-display {
        display: inline-block; font-size: 0.85rem; font-weight: 600;
        color: #c4b5fd; background: rgba(167,139,250,0.1);
        border: 1px solid rgba(167,139,250,0.2); border-radius: 0.55rem;
        padding: 0.3rem 0.8rem; margin-bottom: 2rem;
        word-break: break-all;
      }

      .divider { height: 1px; background: rgba(255,255,255,0.06); margin-bottom: 1.5rem; }

      .tip {
        font-size: 0.78rem; color: rgba(255,255,255,0.22);
        line-height: 1.6; margin-bottom: 1.75rem;
      }
      .tip strong { color: rgba(255,255,255,0.38); }

      .back-link {
        display: inline-block; font-size: 0.8rem; color: rgba(167,139,250,0.6);
        text-decoration: none; margin-top: 0.25rem;
        transition: color 0.15s;
      }
      .back-link:hover { color: #a78bfa; }
    </style>
  </head>
  <body>
    <div class="bg-video-wrap" id="bgWrap">
      <video class="active" src="Video.png/video-1.mp4" muted playsinline preload="auto"></video>
      <video src="Video.png/video-2.mp4" muted playsinline preload="auto"></video>
      <video src="Video.png/video-3.mp4" muted playsinline preload="auto"></video>
      <video src="Video.png/video-4.mp4" muted playsinline preload="auto"></video>
    </div>
    <div class="bg-overlay"></div>

    <main class="card">
      <div class="brand">
        <div class="brand-dot"></div>
        <span class="brand-label">UAN COMMUNITY</span>
      </div>

      <div class="email-icon">✉</div>

      <h1>Sjekk innboksen din.</h1>
      <p class="subtitle">Vi har sendt en innloggingslenke til</p>
      <div class="email-display" id="emailDisplay">—</div>

      <div class="divider"></div>

      <p class="tip">
        <strong>Klikk på lenken i e-posten</strong> for å logge inn.<br />
        Lenken er gyldig i 60 minutter.<br /><br />
        Ser du ikke e-posten? Sjekk søppelpost / spam.
      </p>

      <a class="back-link" href="login.html">← Tilbake til innlogging</a>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/brim.js"></script>
    <script>
      // Video montage
      (function () {
        const videos = Array.from(document.getElementById('bgWrap').querySelectorAll('video'));
        let current = 0;
        videos.forEach(v => { v.loop = true; v.play().catch(() => {}); });
        setInterval(() => {
          const prev = current;
          current = (current + 1) % videos.length;
          videos[current].classList.add('active');
          setTimeout(() => videos[prev].classList.remove('active'), 1400);
        }, 5500);
      })();

      // Show the email address from query param
      const params = new URLSearchParams(window.location.search);
      const email  = params.get('email') || '';
      document.getElementById('emailDisplay').textContent = email || 'din e-postadresse';

      // If user lands here already logged in, send them to dashboard
      getSession().then(s => { if (s) window.location.href = 'dashboard.html'; });
    </script>
  </body>
</html>
