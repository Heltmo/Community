<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brim — Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
        background: #0d0e1a;
      }

      /* Soft gradient orbs — not aggressive, just depth */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 70% 55% at 15% 5%,  rgba(110, 80, 220, 0.14) 0%, transparent 65%),
          radial-gradient(ellipse 55% 45% at 85% 95%, rgba(200, 130, 60,  0.08) 0%, transparent 65%),
          radial-gradient(ellipse 40% 35% at 55% 45%, rgba(60,  80,  160, 0.10) 0%, transparent 70%);
        pointer-events: none;
      }

      /* Very faint grid — just texture, no drama */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 52px 52px;
        pointer-events: none;
      }

      .card {
        position: relative;
        width: min(460px, 100%);
        background: rgba(18, 18, 32, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 1.75rem;
        padding: 3rem 2.75rem;
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.03),
          0 40px 100px rgba(0,0,0,0.55),
          0 0 80px rgba(100,70,200,0.06);
        animation: rise 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes rise {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Top edge glow — violet, not orange */
      .card::before {
        content: '';
        position: absolute;
        top: 0; left: 15%; right: 15%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(140, 100, 255, 0.55), transparent);
      }

      /* Brand mark */
      .brand {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        margin-bottom: 2.25rem;
      }

      .brand-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: linear-gradient(135deg, #a78bfa, #c4b5fd);
        box-shadow: 0 0 10px rgba(167, 139, 250, 0.55);
      }

      .brand-label {
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.025em;
        line-height: 1.15;
        margin-bottom: 0.55rem;
      }

      .subtitle {
        font-size: 0.88rem;
        color: rgba(255,255,255,0.38);
        margin-bottom: 2.25rem;
        font-weight: 400;
        line-height: 1.5;
      }

      .divider {
        height: 1px;
        background: rgba(255,255,255,0.06);
        margin-bottom: 2.25rem;
      }

      .field {
        margin-bottom: 1.2rem;
      }

      label {
        display: block;
        font-size: 0.74rem;
        font-weight: 600;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.38);
        margin-bottom: 0.5rem;
      }

      input {
        width: 100%;
        padding: 0.82rem 1.1rem;
        font-size: 0.95rem;
        font-family: inherit;
        background: rgba(255,255,255,0.045);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 0.9rem;
        color: #fff;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      }

      input::placeholder { color: rgba(255,255,255,0.18); }

      input:focus {
        border-color: rgba(167,139,250,0.55);
        background: rgba(167,139,250,0.05);
        box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
      }

      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0.6) sepia(0.5) saturate(2) hue-rotate(220deg);
        opacity: 0.5;
        cursor: pointer;
      }

      button {
        margin-top: 0.5rem;
        width: 100%;
        padding: 0.9rem;
        font-size: 0.95rem;
        font-family: inherit;
        font-weight: 600;
        letter-spacing: 0.02em;
        border: none;
        border-radius: 0.9rem;
        cursor: pointer;
        background: linear-gradient(135deg, #7c5cfc 0%, #a78bfa 100%);
        color: #fff;
        transition: transform 0.15s, box-shadow 0.2s, opacity 0.15s;
        box-shadow: 0 4px 20px rgba(124, 92, 252, 0.35);
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 28px rgba(124, 92, 252, 0.48);
        opacity: 0.95;
      }

      button:active {
        transform: translateY(1px);
        box-shadow: 0 2px 10px rgba(124, 92, 252, 0.25);
      }

      .footer-note {
        text-align: center;
        margin-top: 1.6rem;
        font-size: 0.72rem;
        color: rgba(255,255,255,0.18);
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <div class="brand-dot"></div>
        <span class="brand-label">Brim Community</span>
      </div>

      <h1>Velkommen inn i fellesskapet.</h1>
      <p class="subtitle">Et varmt og levende fellesskap for deg som vil skape flere minner og nye forbindelser.</p>
      <div class="divider"></div>

      <form>
        <div class="field">
          <label for="fullName">Fullt Navn</label>
          <input type="text" id="fullName" name="fullName" placeholder="Your full name" autocomplete="name" />
        </div>

        <div class="field">
          <label for="birthday">Fødselsdato</label>
          <input type="date" id="birthday" name="birthday" />
        </div>

        <div class="field">
          <label for="phoneNumber">Telefonnummer</label>
          <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="+1 (000) 000-0000" autocomplete="tel" />
        </div>

        <button type="submit">Bli medlem</button>
      </form>

      <p class="footer-note">© 2026 Brim Community — All rights reserved.</p>
    </main>
  </body>
</html>
